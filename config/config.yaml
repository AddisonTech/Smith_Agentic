# smith_agentic/config/config.yaml
# ─────────────────────────────────────────────────────────
# Per-crew model assignments are in the [crew_models] section below.
# CLI --model overrides the crew default for that run only.
# ─────────────────────────────────────────────────────────

llm:
  base_url: http://localhost:11434
  temperature: 0.7
  timeout: 600                # 14B models need more time — increase if timing out

# ── Per-crew model assignments ────────────────────────────────────────────────
# Change a model here to swap it for every future run of that crew.
# Any tag from `ollama list` works.
crew_models:
  default: qwen2.5-coder:7b
  plc:     qwen2.5:7b
  react:   qwen2.5-coder:7b
  vision:  qwen2.5:7b

# ── Fallback (used if crew not found in crew_models) ─────────────────────────
llm_fallback:
  model: llama3.1:8b

crew:
  process: sequential         # sequential | hierarchical
  verbose: true
  max_rpm: 10                 # max requests/min to Ollama (throttle for stability)
  output_dir: outputs         # relative to smith_agentic/
  hitl: true                  # human-in-the-loop plan approval (--no-hitl to skip)

memory:
  persist_dir: memory/chroma  # ChromaDB persistent storage (relative to smith_agentic/)
  collection: smith_agentic_memory    # ChromaDB collection name
  enabled: true               # set false to disable memory entirely

# ── Per-agent model routing (Phase 1D) ───────────────────────────────────────
# Each agent can use a different Ollama model. get_agent_model() in loader.py
# resolves these. Falls back to llm_fallback.model if agent not listed.
agent_models:
  orchestrator:        qwen2.5:7b
  researcher:          qwen2.5:7b
  builder:             qwen2.5-coder:7b
  critic:              qwen2.5:7b
  qa_agent:            llama3.1:8b
  security_agent:      qwen2.5:7b
  docs_agent:          llama3.1:8b
  memory_agent:        llama3.1:8b
  deploy_agent:        qwen2.5:7b
  observability_agent: llama3.1:8b
  vision_analyst:      qwen2.5:7b
  vision_reporter:     llama3.1:8b
  vision_qa:           llama3.1:8b

# ── Vision_Inspect backend connection ─────────────────────────────────────────
vision_inspect:
  base_url: http://localhost:8000   # Vision_Inspect FastAPI service
  timeout:  30                      # seconds per API call
