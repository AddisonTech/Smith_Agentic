# smith_agentic/config/config.yaml
# ─────────────────────────────────────────────────────────
# Per-crew model assignments are in the [crew_models] section below.
# CLI --model overrides the crew default for that run only.
# ─────────────────────────────────────────────────────────

llm:
  base_url: http://localhost:11434
  temperature: 0.7
  timeout: 600                # 14B models need more time — increase if timing out

# ── Per-crew model assignments ────────────────────────────────────────────────
# Change a model here to swap it for every future run of that crew.
# Any tag from `ollama list` works.
crew_models:
  default: deepseek-r1:14b    # best open-source reasoning — handles unknown goal domains
  plc:     deepseek-r1:14b    # reasoning critical for safe PLC planning and safety review
  react:   qwen2.5-coder:14b  # purpose-built code generation for React/MUI work

# ── Fallback (used if crew not found in crew_models) ─────────────────────────
llm_fallback:
  model: llama3.1:8b          # fast fallback if a 14B model isn't available

crew:
  process: sequential         # sequential | hierarchical
  verbose: true
  max_rpm: 10                 # max requests/min to Ollama (throttle for stability)
  output_dir: outputs         # relative to smith_agentic/
  hitl: true                  # human-in-the-loop plan approval (--no-hitl to skip)

memory:
  persist_dir: memory/chroma  # ChromaDB persistent storage (relative to smith_agentic/)
  collection: smith_agentic_memory    # ChromaDB collection name
  enabled: true               # set false to disable memory entirely
